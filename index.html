<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR - NeuroEduca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .qr-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }
        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid #f8fafc;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="qr-card">
        <!-- Encabezado -->
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">
            📱
        </div>
        
        <h2 class="text-2xl font-extrabold text-slate-800 mb-2 tracking-tight">NeuroEduca TDAH</h2>
        <p class="text-slate-500 text-sm mb-8">Escanea este código con la cámara de tu celular para acceder a la plataforma de mini-juegos interactivos.</p>

        <!-- Código QR generado por API -->
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://beatschill742-crypto.github.io/farma/" alt="Código QR NeuroEduca" class="w-full h-auto rounded-xl">
        </div>

        <!-- Pie de tarjeta -->
        <div class="border-t border-slate-100 pt-6">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Proyecto Académico</p>
            <p class="text-sm font-medium text-slate-600 mt-1">Ana Carolina Said Ruiz</p>
        </div>
    </div>

</body>
</html>
